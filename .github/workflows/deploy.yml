name: Deploy SleeperAgent Lambda (SAM)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  id-token: write   # Required for OIDC token exchange
  contents: read

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Use Amazon Corretto — same distribution Lambda uses for java25
      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'corretto'
          cache: 'maven'         # Caches ~/.m2 between runs; meaningfully speeds up builds

      - name: Install SAM CLI
        run: pip install aws-sam-cli

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      # Run tests explicitly here — sam build uses -DskipTests internally,
      # so this is the only place tests actually run in CI
      - name: Run tests
        run: mvn test

      - name: Setup AWS SAM
        uses: aws-actions/setup-sam@v2

      # sam build reads Metadata.BuildMethod: maven from template.yaml and runs
      # mvn package -DskipTests, then stages the JAR for deployment
      - name: Build
        run: sam build --use-container

      - name: Deploy
        run: >
          sam deploy
          --stack-name ${{ secrets.SAM_STACK_NAME }}
          --s3-bucket ${{ secrets.SAM_BUCKET }}
          --no-confirm-changeset
          --no-fail-on-empty-changeset
          --capabilities CAPABILITY_IAM